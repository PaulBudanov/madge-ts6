name: release

on:
  workflow_run:
    workflows:
      - ci
      - security
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master' &&
        github.event.workflow_run.conclusion == 'success'
      )

    steps:
      - name: Wait for ci and security success
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          wait_for_workflow_success() {
            local workflow_file="$1"

            echo "Checking $workflow_file for commit $HEAD_SHA"

            for attempt in $(seq 1 30); do
              conclusion="$(
                gh run list \
                  --repo "$GH_REPO" \
                  --workflow "$workflow_file" \
                  --branch master \
                  --commit "$HEAD_SHA" \
                  --json status,conclusion,headSha \
                  --jq '[.[] | select(.status == "completed" and .headSha == "'"$HEAD_SHA"'")][0].conclusion // ""'
              )"

              if [ "$conclusion" = "success" ]; then
                echo "$workflow_file succeeded"
                return 0
              fi

              if [ "$conclusion" = "failure" ] || [ "$conclusion" = "cancelled" ] || [ "$conclusion" = "timed_out" ] || [ "$conclusion" = "startup_failure" ]; then
                echo "$workflow_file finished with conclusion: $conclusion"
                return 1
              fi

              echo "$workflow_file is not completed yet; attempt $attempt/30"
              sleep 10
            done

            echo "$workflow_file did not complete successfully in time"
            return 1
          }

          wait_for_workflow_success "ci.yml"
          wait_for_workflow_success "security.yml"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.RELEASE_GH_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Test
        run: npm run test

      - name: Smoke-test CLI
        run: npm run debug

      - name: Generate sample graphs
        run: npm run generate

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release

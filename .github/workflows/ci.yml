name: ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Test
        run: npm run test

      - name: Smoke-test CLI
        run: npm run debug

      - name: Generate sample graphs
        run: npm run generate
